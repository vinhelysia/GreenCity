name: CI

# Default branch is master (not main).
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # Local development is Docker-free (native Postgres on Windows).
      # CI only needs install/lint/typecheck/test/build; prisma generate does not need a live DB.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint
        env:
          # Placeholder only — generate does not connect; never use production secrets in CI.
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci?schema=public

      - name: Typecheck
        run: pnpm typecheck
        env:
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci?schema=public

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci?schema=public
