name: CI

# Default branch is master (not main).
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ---------------------------------------------------------------------------
  # Lane 1 — static analysis plus every test that never opens a database
  # connection. This is the fast feedback gate on every push and pull request.
  # ---------------------------------------------------------------------------
  unit:
    name: Static + unit (no database)
    runs-on: ubuntu-latest
    env:
      # Config-parsing placeholder ONLY, never a connection target.
      # src/config/env.ts validates the whole environment whenever a guard or
      # service calls loadEnv() (see audit-regression's OriginGuard case), so the
      # variable must exist and parse. Every suite in this lane mocks Prisma or is
      # pure logic. Database-backed tests run in the `integration` job below,
      # against a real server — they are never faked with this value.
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci?schema=public
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests (no database)
        run: pnpm test:unit

      - name: Build
        run: pnpm build

      - name: Whitespace check
        run: git diff --check

  # ---------------------------------------------------------------------------
  # Lane 2 — the Phase 1 HTTP suite boots the real AppModule and needs a live
  # PostgreSQL with PostGIS. A service container here does NOT make Docker a
  # requirement for local development: the owner workflow stays native Windows.
  # ---------------------------------------------------------------------------
  integration:
    name: PostgreSQL + PostGIS integration
    runs-on: ubuntu-latest
    needs: unit
    services:
      postgres:
        # Same image the repository already assumes in infra/docker/docker-compose.yml.
        image: postgis/postgis:16-3.4
        env:
          # Disposable CI-only credentials. Never owner-machine or production values.
          POSTGRES_USER: greencity_ci
          POSTGRES_PASSWORD: greencity_ci
          POSTGRES_DB: greencity_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U greencity_ci -d greencity_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://greencity_ci:greencity_ci@127.0.0.1:5432/greencity_ci?schema=public
      # psql/pg_isready connection settings for the verification steps.
      PGHOST: 127.0.0.1
      PGPORT: "5432"
      PGUSER: greencity_ci
      PGPASSWORD: greencity_ci
      PGDATABASE: greencity_ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The service health-check already gates startup; this fails fast with a
      # readable message instead of a connection error deep inside Prisma.
      - name: Wait for PostgreSQL
        run: |
          for i in $(seq 1 30); do
            if pg_isready -q; then
              echo "PostgreSQL ready after attempt ${i}."
              exit 0
            fi
            sleep 2
          done
          echo "PostgreSQL did not become ready in time."
          exit 1

      # Reuses the repository's own PostGIS initialisation instead of a second
      # copy of the same CREATE EXTENSION statement.
      - name: Enable PostGIS
        run: psql -v ON_ERROR_STOP=1 -f infra/docker/init/01-postgis.sql

      - name: Apply Prisma migrations
        run: pnpm db:migrate

      # pnpm db:verify is a PowerShell script for the owner's native Windows setup
      # and cannot run on this runner. These are the same two checks it performs.
      - name: Verify database and PostGIS
        run: |
          psql -v ON_ERROR_STOP=1 -c "SELECT 1;"
          psql -v ON_ERROR_STOP=1 -c "SELECT PostGIS_Version();"
          psql -v ON_ERROR_STOP=1 -c "\dt"

      - name: Phase 1 integration tests (real database)
        run: pnpm test:integration
