# GreenCity Phase 0 — local infra only (no app containers)
# Start: docker compose -f infra/docker/docker-compose.yml up -d
#
# Credentials (local dev only — never use in production):
#   Postgres: greencity / greencity  (db: greencity)
#   MinIO:    minioadmin / minioadmin
#   MailHog:  no auth; UI http://localhost:8025

services:
  db:
    image: postgis/postgis:16-3.4
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: greencity
      POSTGRES_PASSWORD: greencity
      POSTGRES_DB: greencity
    volumes:
      - greencity_pgdata:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U greencity -d greencity"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio:
    image: minio/minio
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - greencity_minio:/data

  # One-shot: create default bucket if missing, then exit
  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/greencity;
      exit 0;
      "

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI

volumes:
  greencity_pgdata:
  greencity_minio:
